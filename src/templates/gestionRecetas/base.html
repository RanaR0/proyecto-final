<!DOCTYPE html>
<html lang="es">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}RecetasApp{% endblock %}</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Cabin:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Estilos de recetas -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/recipes.css') }}">

    {% block extra_styles %}{% endblock %}
  </head>

  <body class="min-h-screen">

    {% block content %}{% endblock %}

    <!-- Script de tema oscuro/claro para recetas -->
    <script src="{{ url_for('static', filename='js/recipes-theme.js') }}"></script>

    {% block extra_scripts %}{% endblock %}

  </body>

</html>
