{% extends "usuario/base.html" %}

{% block title %}Nueva Contraseña{% endblock %}

{% block heading %}Nueva Contraseña{% endblock %}

{% block content %}

<form method="POST" class="space-y-5">

  <div>
    <label class="block text-stone-700 text-sm font-medium mb-1">Nueva Contraseña</label>
    <input type="password" name="contrasena_nueva" required minlength="6"
      class="w-full px-4 py-2 border border-stone-300 rounded-lg focus:ring-2 focus:ring-amber-800 focus:outline-none"
      placeholder="Mínimo 6 caracteres">
  </div>

  <div>
    <label class="block text-stone-700 text-sm font-medium mb-1">Confirmar Contraseña</label>
    <input type="password" name="contrasena_confirmar" required minlength="6"
      class="w-full px-4 py-2 border border-stone-300 rounded-lg focus:ring-2 focus:ring-amber-800 focus:outline-none"
      placeholder="Repite tu contraseña">
  </div>

  <button type="submit"
    class="w-full bg-amber-800 text-white py-2 rounded-lg font-medium hover:bg-amber-900 transition">
    Cambiar Contraseña
  </button>

</form>
{% endblock %}

{% block footer_text %}
<a href="{{ url_for('auth.login') }}" class="text-amber-800 font-medium hover:underline">
  Volver a iniciar sesión
</a>
{% endblock %}
