{% extends "usuario/base.html" %}

{% block title %}Crear cuenta{% endblock %}
{% block heading %}Crea tu cuenta{% endblock %}
{% block card_width %}max-w-xl{% endblock %}

{% block content %}
<form method="POST" class="space-y-5">
  <!-- Nombre + Apellidos -->
  <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
    <div>
      <label class="block text-stone-700 text-sm font-medium mb-1.5" for="nombre">Nombre</label>
      <input type="text" id="nombre" name="nombre" required autocomplete="given-name" class="input-base w-full px-4 py-2.5 border border-stone-200 rounded-xl bg-stone-50
               focus:ring-2 focus:ring-amber-700/20 focus:border-amber-700 focus:outline-none
               text-stone-800 placeholder-stone-400 text-sm" placeholder="Tu nombre">
    </div>
    <div>
      <label class="block text-stone-700 text-sm font-medium mb-1.5" for="apellidos">Apellidos</label>
      <input type="text" id="apellidos" name="apellidos" required autocomplete="family-name" class="input-base w-full px-4 py-2.5 border border-stone-200 rounded-xl bg-stone-50
               focus:ring-2 focus:ring-amber-700/20 focus:border-amber-700 focus:outline-none
               text-stone-800 placeholder-stone-400 text-sm" placeholder="Tus apellidos">
    </div>
  </div>

  <!-- Usuario -->
  <div>
    <label class="block text-stone-700 text-sm font-medium mb-1.5" for="usuario">Nombre de usuario</label>
    <div class="relative">
      <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-stone-400 pointer-events-none">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
        </svg>
      </span>
      <input type="text" id="usuario" name="usuario" required autocomplete="username" class="input-base w-full pl-10 pr-4 py-2.5 border border-stone-200 rounded-xl bg-stone-50
               focus:ring-2 focus:ring-amber-700/20 focus:border-amber-700 focus:outline-none
               text-stone-800 placeholder-stone-400 text-sm" placeholder="usuario_unico">
    </div>
  </div>

  <!-- Correo -->
  <div>
    <label class="block text-stone-700 text-sm font-medium mb-1.5" for="gmail">Correo electrónico</label>
    <div class="relative">
      <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-stone-400 pointer-events-none">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75" />
        </svg>
      </span>
      <input type="email" id="gmail" name="gmail" required autocomplete="email" class="input-base w-full pl-10 pr-4 py-2.5 border border-stone-200 rounded-xl bg-stone-50
               focus:ring-2 focus:ring-amber-700/20 focus:border-amber-700 focus:outline-none
               text-stone-800 placeholder-stone-400 text-sm" placeholder="correo@ejemplo.com">
    </div>
  </div>

  <!-- Contraseñas -->
  <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
    <div>
      <label class="block text-stone-700 text-sm font-medium mb-1.5" for="contrasena">Contraseña</label>
      <div class="relative">
        <input type="password" id="contrasena" name="contrasena" required minlength="6"
          oninput="updateStrength(this.value)" class="input-base w-full pl-4 pr-10 py-2.5 border border-stone-200 rounded-xl bg-stone-50
                 focus:ring-2 focus:ring-amber-700/20 focus:border-amber-700 focus:outline-none
                 text-stone-800 placeholder-stone-400 text-sm" placeholder="Mín. 6 caracteres">
        <button type="button" onclick="togglePass('contrasena','eye1')"
          class="absolute right-3 top-1/2 -translate-y-1/2 text-stone-400 hover:text-stone-600 transition-colors"
          tabindex="-1" aria-label="Mostrar u ocultar contraseña">
          <svg id="eye1" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
          </svg>
        </button>
      </div>
      <!-- Barra de fortaleza -->
      <div class="mt-2 flex gap-1">
        <div class="h-1 flex-1 rounded-full bg-stone-200" id="bar1"></div>
        <div class="h-1 flex-1 rounded-full bg-stone-200" id="bar2"></div>
        <div class="h-1 flex-1 rounded-full bg-stone-200" id="bar3"></div>
        <div class="h-1 flex-1 rounded-full bg-stone-200" id="bar4"></div>
      </div>
      <p id="strength-label" class="text-xs text-stone-400 mt-1 h-4"></p>
    </div>

    <div>
      <label class="block text-stone-700 text-sm font-medium mb-1.5" for="contrarep">Repetir contraseña</label>
      <div class="relative">
        <input type="password" id="contrarep" name="contrarep" required oninput="checkMatch()" class="input-base w-full pl-4 pr-10 py-2.5 border border-stone-200 rounded-xl bg-stone-50
                 focus:ring-2 focus:ring-amber-700/20 focus:border-amber-700 focus:outline-none
                 text-stone-800 placeholder-stone-400 text-sm" placeholder="Repite tu contraseña">
        <button type="button" onclick="togglePass('contrarep','eye2')"
          class="absolute right-3 top-1/2 -translate-y-1/2 text-stone-400 hover:text-stone-600 transition-colors"
          tabindex="-1" aria-label="Mostrar u ocultar contraseña">
          <svg id="eye2" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
          </svg>
        </button>
      </div>
      <p id="match-label" class="text-xs mt-1 text-stone-400 h-4"></p>
    </div>
  </div>

  <button type="submit" class="btn-brand w-full bg-amber-800 text-white py-3 rounded-xl font-semibold text-sm
           hover:bg-amber-900 focus:outline-none focus:ring-2 focus:ring-amber-700/50">
    Crear cuenta
  </button>

</form>

<script>
  const STRENGTH_COLORS = ['bg-red-400', 'bg-orange-400', 'bg-yellow-400', 'bg-emerald-500'];
  const STRENGTH_LABELS = ['Muy débil', 'Débil', 'Aceptable', 'Fuerte'];

  function getStrength(pw) {
    let s = 0;
    if (pw.length >= 6) s++;
    if (/[A-Z]/.test(pw)) s++;
    if (/[0-9]/.test(pw)) s++;
    if (/[^A-Za-z0-9]/.test(pw)) s++;
    return s;
  }

  function updateStrength(pw) {
    const bars = ['bar1', 'bar2', 'bar3', 'bar4'].map(id => document.getElementById(id));
    const label = document.getElementById('strength-label');
    if (!pw) {
      bars.forEach(b => { b.className = 'h-1 flex-1 rounded-full bg-stone-200'; });
      label.textContent = '';
      return;
    }
    const s = Math.max(1, getStrength(pw));
    bars.forEach((b, i) => {
      b.className = 'h-1 flex-1 rounded-full ' + (i < s ? STRENGTH_COLORS[s - 1] : 'bg-stone-200');
    });
    label.textContent = STRENGTH_LABELS[s - 1];
    label.className = 'text-xs mt-1 h-4 ' + (s < 2 ? 'text-red-500' : s < 3 ? 'text-yellow-600' : 'text-emerald-600');
    checkMatch();
  }

  function checkMatch() {
    const pw = document.getElementById('contrasena').value;
    const rep = document.getElementById('contrarep').value;
    const label = document.getElementById('match-label');
    if (!rep) { label.textContent = ''; return; }
    if (pw === rep) {
      label.textContent = '✓ Las contraseñas coinciden';
      label.className = 'text-xs mt-1 h-4 text-emerald-600';
    } else {
      label.textContent = '✗ No coinciden';
      label.className = 'text-xs mt-1 h-4 text-red-500';
    }
  }

  function togglePass(inputId, eyeId) {
    const input = document.getElementById(inputId);
    const eye = document.getElementById(eyeId);
    const show = input.type === 'password';
    input.type = show ? 'text' : 'password';
    eye.innerHTML = show
      ? `<path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88"/>`
      : `<path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>`;
  }
</script>
{% endblock %}

{% block footer_text %}
¿Ya tienes cuenta?
<a href="{{ url_for('auth.login') }}" class="text-amber-800 font-semibold hover:underline">
  Inicia sesión
</a>
{% endblock %}
