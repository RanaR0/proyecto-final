{% extends "usuario/base.html" %}

{% block title %}Iniciar sesión{% endblock %}
{% block heading %}Bienvenido de vuelta{% endblock %}

{% block content %}
<form method="POST" class="space-y-5">
  <!-- Usuario -->
  <div>
    <label class="block text-stone-700 text-sm font-medium mb-1.5" for="usuario">
      Nombre de usuario
    </label>
    <div class="relative">
      <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-stone-400 pointer-events-none">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
        </svg>
      </span>
      <input type="text" id="usuario" name="usuario" required autocomplete="username" class="input-base w-full pl-10 pr-4 py-2.5 border border-stone-200 rounded-xl bg-stone-50
               focus:ring-2 focus:ring-amber-700/20 focus:border-amber-700 focus:outline-none
               text-stone-800 placeholder-stone-400 text-sm" placeholder="Tu nombre de usuario">
    </div>
  </div>

  <!-- Contraseña -->
  <div>
    <div class="flex items-center justify-between mb-1.5">
      <label class="block text-stone-700 text-sm font-medium" for="contrasena">
        Contraseña
      </label>
      <span class="text-xs text-stone-400 font-medium">
        Recuperación desactivada
      </span>
    </div>
    <div class="relative">
      <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-stone-400 pointer-events-none">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
        </svg>
      </span>
      <input type="password" id="contrasena" name="contrasena" required autocomplete="current-password" class="input-base w-full pl-10 pr-11 py-2.5 border border-stone-200 rounded-xl bg-stone-50
               focus:ring-2 focus:ring-amber-700/20 focus:border-amber-700 focus:outline-none
               text-stone-800 placeholder-stone-400 text-sm" placeholder="Tu contraseña">
      <button type="button" onclick="togglePass('contrasena','eye-login')"
        class="absolute right-3.5 top-1/2 -translate-y-1/2 text-stone-400 hover:text-stone-600 transition-colors"
        tabindex="-1" aria-label="Mostrar u ocultar contraseña">
        <svg id="eye-login" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
      </button>
    </div>
  </div>


  <button type="submit" class="btn-brand w-full bg-amber-800 text-white py-3 rounded-xl font-semibold text-sm
           hover:bg-amber-900 focus:outline-none focus:ring-2 focus:ring-amber-700/50">
    Iniciar sesión
  </button>

</form>

<script>
  function togglePass(inputId, eyeId) {
    const input = document.getElementById(inputId);
    const eye = document.getElementById(eyeId);
    const show = input.type === 'password';
    input.type = show ? 'text' : 'password';
    eye.innerHTML = show
      ? `<path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88"/>`
      : `<path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>`;
  }
</script>
{% endblock %}

{% block footer_text %}
¿No tienes cuenta?
<a href="{{ url_for('auth.registrarse') }}" class="text-amber-800 font-semibold hover:underline">
  Créala gratis
</a>
{% endblock %}
