<!DOCTYPE html>
<html lang="es">

    <head>
        <meta charset="UTF-8">
        <title>{% block title %}RecetasApp{% endblock %}</title>

        <script src="https://cdn.tailwindcss.com"></script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Cabin:wght@400;500;600;700&display=swap" rel="stylesheet">

        <!-- Estilos de cuenta -->
        <link rel="stylesheet" href="{{ url_for('static', filename='css/account.css') }}">

        {% block extra_styles %}{% endblock %}
    </head>

    <body id="body" class="pb-20 md:pb-0">

        {% include "cuenta/navegador.html" %}

        {% block content %}{% endblock %}

        <!-- Script de tema oscuro/claro para cuenta -->
        <script src="{{ url_for('static', filename='js/account-theme.js') }}"></script>

        {% block extra_scripts %}{% endblock %}
    </body>

</html>
