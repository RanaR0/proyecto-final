<!DOCTYPE html>
<html lang="es">

    <head>
        <meta charset="UTF-8">
        <title>{% block title %}RecetasApp{% endblock %}</title>
        <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='images/icon.svg') }}" />
        <script>
            (function () {
                try {
                    var savedTheme = localStorage.getItem('theme');
                    var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
                    if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
                        document.documentElement.classList.add('dark');
                    }
                } catch (e) { }
            })();
            setTimeout(() => {

            document.querySelectorAll('.fixed.top-4.right-4')
            .forEach(el => {

                el.style.transition = 'opacity 0.5s ease';
                el.style.opacity = '0';

                setTimeout(() => {
                el.remove();
                }, 500);

            });}, 3000);
        </script>

        <script src="https://cdn.tailwindcss.com"></script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link
            href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Cabin:wght@400;500;600;700&display=swap"
            rel="stylesheet">

        <!-- Estilos de cuenta -->
        <link rel="stylesheet" href="{{ url_for('static', filename='css/account.css') }}">

        {% block extra_styles %}{% endblock %}
    </head>
    <body id="body" class="pb-20 md:pb-0">

        {% include "cuenta/navegador.html" %}

        {% block content %}{% endblock %}

        <!-- Script de tema oscuro/claro para cuenta -->
        <script src="{{ url_for('static', filename='js/account-theme.js') }}"></script>

        {% block extra_scripts %}{% endblock %}
    </body>

</html>
