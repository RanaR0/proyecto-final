{% extends "cuenta/base.html" %}

{% block content %}
<div class="max-w-3xl mx-auto px-6 py-10 mb-16">
  <h1 class="text-3xl font-bold mb-6" style="color: var(--text-primary);">Configuración SMTP</h1>

  <div class="rounded-xl shadow p-6" style="background-color: var(--card-bg); border: 1px solid var(--border);">
    <p class="text-sm mb-6" style="color: var(--text-secondary);">
      Configura el servidor SMTP que utilizará la aplicación para enviar códigos de recuperación.
      Los cambios se guardan en <code class="px-1 rounded"
        style="background-color: var(--bg-secondary); color: var(--text-primary);">instance/smtp_config.json</code>.
    </p>

    <form method="post" class="space-y-6">
      <div class="grid grid-cols-1 gap-6 sm:grid-cols-2">
        <div>
          <label class="block text-sm font-medium" style="color: var(--text-primary);">Host SMTP</label>
          <input type="text" name="host" value="{{ smtp.host or '' }}"
            class="mt-1 block w-full px-4 py-2 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-amber-600"
            style="background-color: var(--input-bg); color: var(--input-text); border: 1px solid var(--input-border);"
            required />
        </div>

        <div>
          <label class="block text-sm font-medium" style="color: var(--text-primary);">Puerto</label>
          <input type="number" name="port" value="{{ smtp.port or '' }}"
            class="mt-1 block w-full px-4 py-2 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-amber-600"
            style="background-color: var(--input-bg); color: var(--input-text); border: 1px solid var(--input-border);"
            required />
        </div>
      </div>

      <div class="grid grid-cols-1 gap-6 sm:grid-cols-2">
        <div>
          <label class="block text-sm font-medium" style="color: var(--text-primary);">Usuario SMTP</label>
          <input type="text" name="user" value="{{ smtp.user or '' }}"
            class="mt-1 block w-full px-4 py-2 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-amber-600"
            style="background-color: var(--input-bg); color: var(--input-text); border: 1px solid var(--input-border);"
            required />
        </div>

        <div>
          <label class="block text-sm font-medium" style="color: var(--text-primary);">Correo remitente</label>
          <input type="email" name="from_address" value="{{ smtp.from_address or '' }}"
            class="mt-1 block w-full px-4 py-2 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-amber-600"
            style="background-color: var(--input-bg); color: var(--input-text); border: 1px solid var(--input-border);"
            required />
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium" style="color: var(--text-primary);">Contraseña SMTP</label>
        <input type="password" name="password" value="{{ smtp.password or '' }}"
          class="mt-1 block w-full px-4 py-2 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-amber-600"
          style="background-color: var(--input-bg); color: var(--input-text); border: 1px solid var(--input-border);"
          required />
      </div>

      <div class="flex flex-wrap gap-4">
        <label class="inline-flex items-center gap-2 cursor-pointer">
          <input type="checkbox" name="use_tls" {% if smtp.use_tls %}checked{% endif %}
            class="rounded accent-amber-600 focus:ring-amber-600 w-4 h-4" />
          <span class="text-sm" style="color: var(--text-primary);">Usar STARTTLS</span>
        </label>
        <label class="inline-flex items-center gap-2 cursor-pointer">
          <input type="checkbox" name="use_ssl" {% if smtp.use_ssl %}checked{% endif %}
            class="rounded accent-amber-600 focus:ring-amber-600 w-4 h-4" />
          <span class="text-sm" style="color: var(--text-primary);">Usar SSL/TLS</span>
        </label>
      </div>

      <div class="flex items-center justify-between gap-4 pt-4">
        <button type="submit"
          class="inline-flex items-center justify-center rounded-lg px-5 py-3 text-sm font-semibold text-white transition hover:opacity-90"
          style="background-color: #d97706;">Guardar
          configuración</button>
        <a href="{{ url_for('cuenta.ajustes') }}" class="text-sm font-medium transition"
          style="color: var(--text-secondary); cursor: pointer;" onmouseover="this.style.color='var(--text-primary)'"
          onmouseout="this.style.color='var(--text-secondary)'">Volver a
          ajustes</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
