{% extends "cuenta/base.html" %}

{% block content %}
<div class="max-w-6xl mx-auto px-4 py-8">

  <h1 class="text-2xl font-bold mb-6" style="color: var(--text-primary);">Buscar Recetas</h1>

  <!-- Campo de búsqueda -->
  <div class="mb-8">
    <input type="text" id="search-input" placeholder="Buscar recetas..."
      class="w-full px-4 py-2 rounded-lg focus:ring-2 focus:ring-amber-800 focus:outline-none"
      style="background-color: var(--input-bg); color: var(--input-text); border: 1px solid var(--input-border);">
  </div>

  <!-- Grid de recetas -->
  <div class="grid grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4" id="recetas-grid">
    <div id="recetas-grid"></div>
  </div>

  <!-- Loader -->
  <div id="loader" class="hidden text-center py-4">
    <i class="fas fa-spinner fa-spin text-stone-500"></i>
  </div>

  {% if not recetas %}
  <div class="text-center py-12">
    <i class="fas fa-search text-4xl text-stone-400 mb-4"></i>
    <p class="text-stone-600">No se encontraron recetas</p>
  </div>
  {% endif %}

</div>

<script src="{{ url_for('static', filename='js/busqueda.js') }}"></script>

{% endblock %}
